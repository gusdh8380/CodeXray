<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CodeXray</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>CodeXray</h1>
          <p>Local codebase analysis</p>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">Dark</button>
        <form id="analysis-form" class="path-form">
          <label for="path-input">Path</label>
          <input id="path-input" name="path" type="text" value="{{ default_path }}" autocomplete="off">
          <button class="browse-button" type="button" hx-post="/api/browse-folder" hx-target="#status-text" hx-swap="outerHTML">Browse</button>
          <select id="recent-paths" aria-label="Recent paths">
            <option value="">Recent</option>
          </select>
          <span id="status-text" class="status-text" role="status">Ready</span>
        </form>
      </header>

      <section class="workspace">
        <nav class="tabs" aria-label="Analysis tabs">
          <button class="tab-button is-active" data-tab="Briefing" type="button" hx-post="/api/briefing" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Briefing</button>
          <button class="tab-button" data-tab="Overview" type="button" hx-post="/api/overview" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Overview</button>
          <button class="tab-button" data-tab="Inventory" type="button" hx-post="/api/inventory" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Inventory</button>
          <button class="tab-button" data-tab="Metrics" type="button" hx-post="/api/metrics" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Metrics</button>
          <button class="tab-button" data-tab="Quality" type="button" hx-post="/api/quality" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Quality</button>
          <button class="tab-button" data-tab="Hotspots" type="button" hx-post="/api/hotspots" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Hotspots</button>
          <button class="tab-button" data-tab="Report" type="button" hx-post="/api/report" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Report</button>
          <button class="tab-button" data-tab="Review" type="button" hx-post="/api/review" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Review</button>
          <span class="tab-divider" aria-hidden="true"></span>
          <button class="tab-button tab-detail" data-tab="Graph" type="button" hx-post="/api/graph" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Graph</button>
          <button class="tab-button tab-detail" data-tab="Entrypoints" type="button" hx-post="/api/entrypoints" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Entrypoints</button>
          <button class="tab-button tab-detail" data-tab="Dashboard" type="button" hx-post="/api/dashboard" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Dashboard</button>
          <button class="tab-button tab-detail" data-tab="Vibe Coding" type="button" hx-post="/api/vibe-coding" hx-include="#analysis-form" hx-target="#result-panel" hx-swap="innerHTML">Vibe Coding</button>
        </nav>

        <section id="result-panel" class="result-host" aria-live="polite">
          <section class="empty-state">
            <h2>Overview</h2>
            <p>Select a tab to run analysis for the current path.</p>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
